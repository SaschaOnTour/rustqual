name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Build
        run: cargo build

      - name: Test
        run: cargo nextest run

      - name: Coverage
        run: cargo llvm-cov --lcov --output-path coverage.lcov nextest

      - name: Self-analysis
        run: cargo run -- . --fail-on-warnings --coverage coverage.lcov
